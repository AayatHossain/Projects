<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TakaTrack — Advisor Plan (Flow Diagram)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #0f172a; color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif; }
  .head { padding: 16px 22px 4px; }
  .head h1 { margin: 0; font-size: 20px; color: #fff; }
  .head p  { margin: 4px 0 0; font-size: 13px; color: #94a3b8; }

  .legend { padding: 8px 22px 14px; font-size: 12px; }
  .legend span { margin-right: 16px; white-space: nowrap; }
  .dot { display:inline-block; width:11px; height:11px; border-radius:3px;
    margin-right:6px; vertical-align:middle; }

  /* scroll wrapper so the fixed-size canvas is always reachable */
  .scroller { overflow: auto; padding: 0 22px 30px; }
  #canvas { position: relative; width: 1240px; height: 880px; margin: 0 auto; }

  svg.wires { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  .node { position:absolute; border-radius:12px; padding:9px 12px;
    color:#0f172a; border:2px solid rgba(255,255,255,.55);
    box-shadow:0 4px 14px rgba(0,0,0,.35); text-align:center;
    transition: transform .12s, box-shadow .12s; }
  .node:hover { transform: translateY(-2px); box-shadow:0 8px 22px rgba(0,0,0,.5); }
  .node .t { font-weight:700; font-size:13px; line-height:1.25; }
  .node .s { font-size:11px; opacity:.82; margin-top:2px; }

  .elabel { fill:#cbd5e1; font-size:10px; font-family:system-ui,sans-serif; }
  .elabel-bg { fill:#1e293b; }
</style>
</head>
<body>
  <div class="head">
    <h1>টাকাট্র্যাক — Advanced Advisor Plan</h1>
    <p>Data flows top → bottom. Rule: <b>Python computes the numbers, Claude explains them in Bangla.</b></p>
  </div>
  <div class="legend" id="legend"></div>
  <div class="scroller">
    <div id="canvas">
      <svg class="wires" id="wires" viewBox="0 0 1240 880" preserveAspectRatio="none">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
          </marker>
        </defs>
      </svg>
    </div>
  </div>

<script>
  const C = {
    user:    '#bae6fd', compute: '#fde68a', ai: '#ddd6fe',
    data:    '#bbf7d0', output:  '#fecaca',
  };
  const LEGEND = [
    ['Frontend / entry', C.user],
    ['Python compute',   C.compute],
    ['Claude AI',        C.ai],
    ['Storage',          C.data],
    ['User-facing output', C.output],
  ];

  // id, x, y, w, h, color, title, subtitle
  const NODES = [
    // frontend entry
    ['log',   30,  20, 210, 60, C.user, 'খরচ লগ করা', 'Log expense (+bucket)'],
    ['open',  300, 20, 210, 60, C.user, 'অ্যাপ খোলা', 'Open / daily check'],
    ['play',  570, 20, 210, 60, C.user, 'গেম খেলা', 'Play a quest'],
    ['ask',   840, 20, 210, 60, C.user, 'AI কে জিজ্ঞাসা', 'Ask the advisor'],
    // backend entry
    ['api',   490, 150, 260, 58, C.user, 'FastAPI Backend', 'routers → services'],
    // compute services
    ['snap',  40,  290, 220, 64, C.compute, 'snapshot.py', 'Build financial state'],
    ['pred',  340, 290, 220, 64, C.compute, 'predictor.py', 'project + simulate · file 02'],
    ['score', 660, 290, 220, 64, C.compute, 'scoring.py', 'Health Score · file 03'],
    ['game',  960, 290, 220, 64, C.compute, 'game.py', 'XP / levels / scenario'],
    // decision
    ['advise',300, 440, 240, 64, C.compute, 'advisor.py', 'Gate + instrument match · file 01'],
    // ai + data
    ['claude',300, 590, 220, 64, C.ai,   'Claude API', 'Numbers → Bangla advice'],
    ['store', 760, 590, 220, 64, C.data, 'storage.py', 'expenses · goals · progress'],
    // outputs
    ['verdict', 20, 740, 200, 66, C.output, 'হোম verdict card', 'status + 1 fix'],
    ['chart',  250, 740, 200, 66, C.output, 'Prediction chart', '"broke day" line'],
    ['invest', 480, 740, 200, 66, C.output, 'Investment menu', 'DPS · Sanchayapatra…'],
    ['badge',  710, 740, 200, 66, C.output, 'Badges + Score', 'গেম rewards'],
    ['push',   940, 740, 200, 66, C.output, 'Push notification', 'Proactive nudge'],
  ];

  // from, to, label
  const EDGES = [
    ['log','api'], ['open','api'], ['play','api'], ['ask','api'],
    ['api','snap'], ['api','pred'], ['api','score'], ['api','game'],
    ['snap','advise','state'], ['pred','advise','projection'],
    ['pred','chart','timeline'],
    ['advise','claude','context'],
    ['advise','invest','after gate'],
    ['game','badge'], ['game','store'], ['score','badge'],
    ['claude','verdict'], ['claude','push'],
    ['snap','store'], ['pred','store'], ['advise','verdict'],
  ];

  const M = {};
  NODES.forEach(n => { const [id,x,y,w,h]=n; M[id]={x,y,w,h}; });

  // legend
  document.getElementById('legend').innerHTML = LEGEND.map(
    ([t,c]) => `<span><span class="dot" style="background:${c}"></span>${t}</span>`
  ).join('');

  // nodes
  const canvas = document.getElementById('canvas');
  NODES.forEach(([id,x,y,w,h,color,title,sub]) => {
    const d = document.createElement('div');
    d.className = 'node';
    d.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${color};`;
    d.innerHTML = `<div class="t">${title}</div><div class="s">${sub}</div>`;
    canvas.appendChild(d);
  });

  // wires
  const svg = document.getElementById('wires');
  const NS = 'http://www.w3.org/2000/svg';
  EDGES.forEach(([from,to,label]) => {
    const a = M[from], b = M[to];
    const x1 = a.x + a.w/2, y1 = a.y + a.h;       // source bottom-center
    const x2 = b.x + b.w/2, y2 = b.y;             // target top-center
    const dy = Math.max(30, (y2 - y1) / 2);
    const path = document.createElementNS(NS,'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${y1+dy}, ${x2} ${y2-dy}, ${x2} ${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#94a3b8');
    path.setAttribute('stroke-width','1.6');
    path.setAttribute('marker-end','url(#arrow)');
    svg.appendChild(path);

    if (label) {
      const mx = (x1+x2)/2, my = (y1+y2)/2;
      const bg = document.createElementNS(NS,'rect');
      const tw = label.length*6 + 8;
      bg.setAttribute('x', mx - tw/2); bg.setAttribute('y', my - 8);
      bg.setAttribute('width', tw); bg.setAttribute('height', 15);
      bg.setAttribute('rx', 3); bg.setAttribute('class','elabel-bg');
      svg.appendChild(bg);
      const txt = document.createElementNS(NS,'text');
      txt.setAttribute('x', mx); txt.setAttribute('y', my + 3);
      txt.setAttribute('text-anchor','middle'); txt.setAttribute('class','elabel');
      txt.textContent = label;
      svg.appendChild(txt);
    }
  });
</script>
</body>
</html>
